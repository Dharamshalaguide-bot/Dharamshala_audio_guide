<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharamshala Guide</title>
    <style>
        :root { --accent: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; background: url('hills.jpg') center/cover fixed; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        
        /* Аккордеон (раскрывающийся список) */
        .content { display: none; margin-top: 15px; text-align: left; }
        .stop { border-top: 1px solid #ddd; padding: 15px 0; }
        .btn-toggle { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: bold; }
        
        .play-small { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8em; margin-top: 5px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { position: relative; width: 95%; max-width: 700px; margin: 10% auto; background: #fff; padding: 10px; border-radius: 20px; }
    </style>
</head>
<body>

    <h1>Dharamshala Guide</h1>

    <!-- ПРИВЕТСТВИЕ -->
    <div class="card">
        <h3>Добро пожаловать</h3>
        <p>Начните ваше путешествие по Дхарамсале</p>
        <button class="btn-toggle" onclick="document.getElementById('player1').style.display='block'; this.style.display='none'">Слушать</button>
        <audio id="player1" class="audio-player" style="display:none; width:100%;" controls><source src="Welcome.mp3" type="audio/mpeg"></audio>
    </div>

    <!-- МАРШРУТ (Раскрывается) -->
    <div class="card">
        <h3>Кора: путь паломников</h3>
        <button class="btn-toggle" onclick="toggleAccordion()">Раскрыть маршрут</button>
        
        <div id="routeContent" class="content">
            <button class="play-small" style="width: 100%;" onclick="document.getElementById('mapModal').style.display='block'">Открыть карту маршрута</button>
            
            <div class="stop">
                <h4>Остановка 1: Старт</h4>
                <button class="play-small" onclick="document.getElementById('a1').play()">Слушать</button>
                <audio id="a1"><source src="stop1.mp3"></audio>
            </div>
            <div class="stop">
                <h4>Остановка 2: Барабаны</h4>
                <button class="play-small" onclick="document.getElementById('a2').play()">Слушать</button>
                <audio id="a2"><source src="stop2.mp3"></audio>
            </div>
            <!-- Добавляйте сюда блоки .stop по аналогии -->
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="mapModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <iframe src="https://www.google.com/maps/embed?..." width="100%" height="400" style="border:0; border-radius:15px;"></iframe>
        </div>
    </div>

    <script>
        function toggleAccordion() {
            var content = document.getElementById("routeContent");
            content.style.display = (content.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
