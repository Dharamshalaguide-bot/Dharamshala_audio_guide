<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dharamshala Guide</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            /* Имя файла должно совпадать с тем, что вы загрузите на GitHub */
            background-image: url('hills.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
            font-size: 3em;
            margin-bottom: 40px;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            width: 300px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        button {
            background-color: #2d5a27;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .audio-player {
            display: none;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1>Dharamshala Guide</h1>

    <div class="card">
        <h3>Приветствие</h3>
        <p>Знакомство с гидом</p>
        <button id="btn1" onclick="showPlayer('player1', 'btn1')">Слушать</button>
        <audio id="player1" class="audio-player" controls>
            <source src="Welcome.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="card">
        <h3>Маклеод-Ганж</h3>
        <p>Авторская прогулка</p>
        <button id="btn2" onclick="showPlayer('player2', 'btn2')">Слушать</button>
        <audio id="player2" class="audio-player" controls>
            <source src="Mcleodganj.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function showPlayer(playerId, btnId) {
            var player = document.getElementById(playerId);
            var btn = document.getElementById(btnId);
            player.style.display = "block";
            btn.style.display = "none";
            player.play();
        }
    </script>

</body>
</html>
