<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body { font-family: sans-serif; background-color: #fdfbf7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 20px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    button { background-color: #2d5a27; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; }
    
    /* Стили для плееров */
    .audio-player { display: none; margin-top: 15px; width: 100%; }
</style>
</head>
<body>

<h1>Dharamshala Guide</h1>

<div class="card">
    <h3>Приветствие</h3>
    <p>Знакомство</p>
    <button id="btn1" onclick="showPlayer('player1', 'btn1')">Слушать</button>
    <audio id="player1" class="audio-player" controls>
        <source src="Welcome.mp3" type="audio/mpeg">
    </audio>
</div>

<div class="card">
    <h3>Маклеод-Ганж</h3>
    <p>Авторская прогулка</p>
    <button id="btn2" onclick="showPlayer('player2', 'btn2')">Слушать</button>
    <audio id="player2" class="audio-player" controls>
        <source src="Mcleodganj.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function showPlayer(playerId, btnId) {
    var player = document.getElementById(playerId);
    var btn = document.getElementById(btnId);
    player.style.display = "block";
    btn.style.display = "none";
    player.play();
}
</script>

</body>
</html>
