<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharamshala Guide</title>
    <style>
        :root { --accent: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; background: url('hills.jpg') center/cover fixed; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        h1 { color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin-bottom: 30px; }
        h3 { margin: 0 0 10px; color: #333; }
        
        .play-btn { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .map-btn { background: transparent; color: var(--accent); border: 2px solid var(--accent); padding: 10px 20px; border-radius: 50px; cursor: pointer; margin-top: 15px; font-size: 0.9em; }
        
        .audio-player { width: 100%; margin-top: 15px; display: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { position: relative; width: 95%; max-width: 700px; margin: 10% auto; background: #fff; padding: 10px; border-radius: 20px; }
    </style>
</head>
<body>

    <h1>Dharamshala Guide</h1>

    <!-- 1. ПРИВЕТСТВИЕ -->
    <div class="card">
        <h3>Добро пожаловать</h3>
        <p>Знакомство с гидом</p>
        <button id="btn1" class="play-btn" onclick="showPlayer('player1', 'btn1')">Слушать приветствие</button>
        <audio id="player1" class="audio-player" controls><source src="Welcome.mp3" type="audio/mpeg"></audio>
    </div>

    <!-- 2. КОРА -->
    <div class="card">
        <h3>Кора вокруг резиденции Далай-ламы</h3>
        <p>Традиционный путь паломников</p>
        <button id="btn2" class="play-btn" onclick="showPlayer('player2', 'btn2')">Слушать аудиогид</button>
        <audio id="player2" class="audio-player" controls><source src="Mcleodganj.mp3" type="audio/mpeg"></audio>
        <br>
        <button class="map-btn" onclick="document.getElementById('mapModal').style.display='block'">Посмотреть карту маршрута</button>
    </div>

    <!-- Модальное окно с картой -->
    <div id="mapModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <iframe src="https://www.google.com/maps/embed?pb=!1m52!1m12!1m3!1d1045.9900366916454!2d76.32403834286286!3d32.23231950792452!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m37!3e2!4m5!1s0x391b516068f7cfd7%3A0x5aec125fb5dc2930!2sStart%20of%20the%20Kora%20Circuit%2C%20Temple%20Rd%2C%20McLeod%20Ganj%2C%20Dharamshala%2C%20Himachal%20Pradesh%20176215%2C%20%D0%98%D0%BD%D0%B4%D0%B8%D1%8F!3m2!1d32.2320218!2d76.3252083!4m5!1s0x391b510049b26e5d%3A0xdfa6f391303dee3d!2sCircumambulation%20Way%20Dalai%20Lama%20Temple%2C%2068JG%2BF9P%2C%20Dharamshala%2C%20Himachal%20Pradesh%20176215%2C%20%D0%98%D0%BD%D0%B4%D0%B8%D1%8F!3m2!1d32.2312206!2d76.3259633!4m3!3m2!1d32.2292724!2d76.32523979999999!4m3!3m2!1d32.2283551!2d76.3233343!4m3!3m2!1d32.2298621!2d76.3226992!4m3!3m2!1d32.2310939!2d76.3237216!4m3!3m2!1d32.23307!2d76.32452719999999!4m3!3m2!1d32.232599!2d76.3248759!5e0!3m2!1sru!2sru!4v1783443888358!5m2!1sru!2sru" width="100%" height="400" style="border:0; border-radius:15px;"></iframe>
        </div>
    </div>

    <script>
        function showPlayer(playerId, btnId) {
            // Плеер просто становится видимым
            document.getElementById(playerId).style.display = "block";
            // Кнопка остается, можно просто скрыть её, если хотите
            document.getElementById(btnId).style.display = "none";
            document.getElementById(playerId).play();
        }
    </script>
</body>
</html>
