<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { font-family: sans-serif; background-color: #fdfbf7; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.card { background: white; border-radius: 16px; padding: 20px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
button { background-color: #2d5a27; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; }
</style>
</head>
<body>

<h1>Dharamshala Guide</h1>

<!-- Блок Приветствие -->
<div class="card">
    <h3>Приветствие</h3>
    <p>Знакомство</p>
    <!-- Убедитесь, что файл Welcome.mp3 лежит в той же папке, что и этот файл -->
    <audio id="audio-welcome" src="Welcome.mp3"></audio>
    <button onclick="document.getElementById('audio-welcome').play()">Слушать</button>
</div>

<!-- Блок Экскурсии -->
<div class="card">
    <h3>Маклеод-Ганж</h3>
    <p>Авторская прогулка</p>
    <button onclick="alert('Работает!')">Слушать</button>
</div>

</body>
</html>
