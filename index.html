<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharamshala Guide</title>
    <style>
        :root { 
            --bg: #FDFBF7; 
            --card-bg: #F4EAE5; 
            --accent: #70887A; 
            --secondary: #D7B19C; 
            --text-main: #998F8A; 
            --radius: 12px; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
        }
        
        h1 { color: var(--accent); margin-bottom: 30px; font-weight: 300; font-size: 1.4em; }
        
        .card { 
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid var(--card-bg);
            border-radius: 20px; 
            padding: 20px; width: 90%; max-width: 450px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); 
            margin-bottom: 20px; text-align: center;
        }
        
        h3 { margin: 0 0 5px; font-size: 1em; color: var(--text-main); font-weight: 600; }
        .subtitle { font-size: 0.8em; color: var(--text-main); margin-bottom: 15px; }
        
        /* Единый стиль для текста пунктов и кнопок */
        .stop-text { font-size: 0.85em; font-weight: 600; color: var(--text-main); }

        .btn { font-family: inherit; font-size: 0.85em; font-weight: 600; padding: 8px 14px; border-radius: 20px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-full { background: var(--accent); color: white; width: 100%; }
        .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); width: 100%; padding: 10px; margin-bottom: 15px; }
        .btn-small { background: var(--secondary); color: white; }

        .header-active { display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 15px; }
        
        .content { display: none; margin-top: 15px; border-top: 1px solid var(--card-bg); padding-top: 15px; text-align: left; }
        .stop { padding: 10px 0; border-bottom: 1px solid var(--card-bg); display: flex; justify-content: space-between; align-items: center; }
        
        .audio-container { margin-top: 8px; display: none; width: 100%; }
        audio { width: 100%; height: 30px; }
    </style>
</head>
<body>

    <h1>Dharamshala Guide</h1>

    <div class="card">
        <h3>Добро пожаловать</h3>
        <p class="subtitle">Знакомство с гидом</p>
        <button class="btn btn-full" onclick="document.getElementById('welcomeAudioCont').style.display='block'; document.getElementById('audioWelcome').play(); this.style.display='none'">Слушать</button>
        <div id="welcomeAudioCont" class="audio-container"><audio id="audioWelcome" controls><source src="Welcome.mp3"></audio></div>
    </div>

    <div class="card">
        <div id="closedState">
            <h3>Кора вокруг резиденции</h3>
            <p class="subtitle">Традиционный путь паломников</p>
            <button class="btn btn-full" onclick="toggleRoute(true)">Раскрыть маршрут</button>
        </div>
        
        <div id="openState" class="content">
            <div class="header-active" onclick="toggleRoute(false)">
                <div><h3>Кора вокруг резиденции</h3><p class="subtitle">Традиционный путь паломников</p></div>
                <span>▲</span>
            </div>
            
            <button class="btn btn-outline" onclick="document.getElementById('mapModal').style.display='block'">Посмотреть карту маршрута</button>
            
            <div class="stop"><span class="stop-text">1. Старт Коры</span><button class="btn btn-small" onclick="document.getElementById('p1').style.display='block'; document.getElementById('a1').play()">Слушать</button></div><div id="p1" class="audio-container"><audio id="a1" controls><source src="stop1.mp3"></audio></div>
            <div class="stop"><span class="stop-text">2. Молитвенные барабаны</span><button class="btn btn-small" onclick="document.getElementById('p2').style.display='block'; document.getElementById('a2').play()">Слушать</button></div><div id="p2" class="audio-container"><audio id="a2" controls><source src="stop2.mp3"></audio></div>
            <div class="stop"><span class="stop-text">3. Молитвенные флажки</span><button class="btn btn-small" onclick="document.getElementById('p3').style.display='block'; document.getElementById('a3').play()">Слушать</button></div><div id="p3" class="audio-container"><audio id="a3" controls><source src="stop3.mp3"></audio></div>
            <div class="stop"><span class="stop-text">4. Вид на Гималаи</span><button class="btn btn-small" onclick="document.getElementById('p4').style.display='block'; document.getElementById('a4').play()">Слушать</button></div><div id="p4" class="audio-container"><audio id="a4" controls><source src="stop4.mp3"></audio></div>
            <div class="stop"><span class="stop-text">5. Ступы и мантры</span><button class="btn btn-small" onclick="document.getElementById('p5').style.display='block'; document.getElementById('a5').play()">Слушать</button></div><div id="p5" class="audio-container"><audio id="a5" controls><source src="stop5.mp3"></audio></div>
            <div class="stop"><span class="stop-text">6. Мемориальная роща</span><button class="btn btn-small" onclick="document.getElementById('p6').style.display='block'; document.getElementById('a6').play()">Слушать</button></div><div id="p6" class="audio-container"><audio id="a6" controls><source src="stop6.mp3"></audio></div>
            <div class="stop"><span class="stop-text">7. Ворота храма</span><button class="btn btn-small" onclick="document.getElementById('p7').style.display='block'; document.getElementById('a7').play()">Слушать</button></div><div id="p7" class="audio-container"><audio id="a7" controls><source src="stop7.mp3"></audio></div>
        </div>
    </div>

    <script>
        function toggleRoute(open) {
            document.getElementById('closedState').style.display = open ? 'none' : 'block';
            document.getElementById('openState').style.display = open ? 'block' : 'none';
        }
    </script>
</body>
</html>
