<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dharamshala Guide</title>
    <style>
        :root { --accent: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; background: url('hills.jpg') center/cover fixed; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        
        /* Стили стрелки */
        .header-toggle { cursor: pointer; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .arrow { transition: transform 0.3s; font-size: 1.5em; color: var(--accent); }
        .rotate { transform: rotate(180deg); }
        
        .content { display: none; margin-top: 20px; text-align: left; border-top: 1px solid #eee; pt: 15px; }
        .map-btn { background: transparent; color: var(--accent); border: 2px solid var(--accent); padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        
        .stop { padding: 15px 0; border-bottom: 1px solid #eee; }
        .play-small { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8em; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { position: relative; width: 95%; max-width: 700px; margin: 10% auto; background: #fff; padding: 10px; border-radius: 20px; }
    </style>
</head>
<body>

    <h1>Dharamshala Guide</h1>

    <div class="card">
        <h3>Добро пожаловать</h3>
        <p>Начните ваше путешествие по Дхарамсале</p>
        <button class="play-small" onclick="document.getElementById('welcomeAudio').play()">Слушать приветствие</button>
        <audio id="welcomeAudio"><source src="Welcome.mp3"></audio>
    </div>

    <div class="card">
        <div class="header-toggle" onclick="toggleRoute(this)">
            <div style="text-align: left;">
                <h3 style="margin:0;">Кора вокруг резиденции Далай-ламы</h3>
                <p style="margin:0; font-size: 0.85em; color: #666;">Традиционный путь паломников</p>
            </div>
            <span class="arrow">▼</span>
        </div>
        
        <div id="routeContent" class="content">
            <button class="map-btn" onclick="document.getElementById('mapModal').style.display='block'">Посмотреть карту маршрута</button>
            <div class="stop"><h4>Остановка 1: Старт Коры</h4><button class="play-small" onclick="document.getElementById('a1').play()">Слушать</button><audio id="a1"><source src="stop1.mp3"></audio></div>
            </div>
    </div>

    <div id="mapModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <iframe src="ВАША_ССЫЛКА_ИЗ_GOOGLE" width="100%" height="400" style="border:0; border-radius:15px;"></iframe>
        </div>
    </div>

    <script>
        function toggleRoute(el) {
            var content = document.getElementById("routeContent");
            var arrow = el.querySelector(".arrow");
            
            if (content.style.display === "block") {
                content.style.display = "none";
                arrow.classList.remove("rotate");
            } else {
                content.style.display = "block";
                arrow.classList.add("rotate");
            }
        }
    </script>
</body>
</html>
